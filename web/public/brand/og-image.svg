<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F0F23"/>

  <!-- Subtle grid/noise texture via repeating lines -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1E1E3A" stroke-width="0.5"/>
    </pattern>
    <!-- Indigo glow gradient -->
    <radialGradient id="glow" cx="30%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#4F46E5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0F0F23" stop-opacity="0"/>
    </radialGradient>
    <!-- Amber glow -->
    <radialGradient id="amber-glow" cx="78%" cy="40%" r="30%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F0F23" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#amber-glow)"/>

  <!-- Decorative scattered stars (background) -->
  <circle cx="900" cy="80"  r="1.5" fill="#A5B4FC" opacity="0.6"/>
  <circle cx="1050" cy="150" r="1"  fill="#A5B4FC" opacity="0.4"/>
  <circle cx="980"  cy="200" r="2"  fill="#F59E0B" opacity="0.5"/>
  <circle cx="1100" cy="320" r="1.5" fill="#A5B4FC" opacity="0.3"/>
  <circle cx="850"  cy="400" r="1"  fill="#A5B4FC" opacity="0.5"/>
  <circle cx="1150" cy="490" r="1.5" fill="#F59E0B" opacity="0.4"/>
  <circle cx="920"  cy="550" r="1"  fill="#A5B4FC" opacity="0.3"/>

  <!-- Logo A (Lyra constellation) — left block -->
  <!-- Scaled up to ~160px tall, positioned left-center -->
  <g transform="translate(100, 155) scale(2.9)">
    <circle cx="30" cy="8"  r="2.5" fill="#F59E0B"/>
    <circle cx="16" cy="20" r="1.8" fill="#A5B4FC"/>
    <circle cx="44" cy="20" r="1.8" fill="#A5B4FC"/>
    <circle cx="20" cy="38" r="1.8" fill="#A5B4FC"/>
    <circle cx="40" cy="38" r="1.8" fill="#A5B4FC"/>
    <circle cx="30" cy="50" r="2"   fill="#6366F1"/>
    <line x1="30" y1="8"  x2="16" y2="20" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="30" y1="8"  x2="44" y2="20" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="16" y1="20" x2="44" y2="20" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="16" y1="20" x2="20" y2="38" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="44" y1="20" x2="40" y2="38" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="20" y1="38" x2="40" y2="38" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="20" y1="38" x2="30" y2="50" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="40" y1="38" x2="30" y2="50" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Vertical divider -->
  <line x1="370" y1="180" x2="370" y2="450" stroke="#1E1E3A" stroke-width="1.5"/>

  <!-- Brand name -->
  <text
    x="420"
    y="310"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="800"
    letter-spacing="-3"
    fill="#FFFFFF"
  >lyrvio</text>

  <!-- Star above i — adjusted for 96px font -->
  <g transform="translate(754, 190)">
    <path d="M0,-10 L2.4,-2.4 L10,0 L2.4,2.4 L0,10 L-2.4,2.4 L-10,0 L-2.4,-2.4 Z"
          fill="#F59E0B"/>
  </g>

  <!-- Tagline -->
  <text
    x="420"
    y="390"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#A5B4FC"
    letter-spacing="0.3"
  >Sei der erste der antwortet — der Bot macht's für dich</text>

  <!-- Bottom badge -->
  <rect x="420" y="460" width="220" height="40" rx="20" fill="#4F46E5" opacity="0.9"/>
  <text
    x="530"
    y="485"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    font-weight="600"
    fill="#FFFFFF"
  >Wohnungs-Bot</text>

  <!-- Thin bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" rx="0" fill="#4F46E5" opacity="0.6"/>
</svg>
