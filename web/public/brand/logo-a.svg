<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- Lyra constellation: 5 stars + connecting lines -->
  <!-- Stars as small circles -->
  <!-- Top star (alpha Lyrae / Vega) -->
  <circle cx="30" cy="8" r="2.5" fill="#F59E0B"/>
  <!-- Upper left -->
  <circle cx="16" cy="20" r="1.8" fill="#A5B4FC"/>
  <!-- Upper right -->
  <circle cx="44" cy="20" r="1.8" fill="#A5B4FC"/>
  <!-- Lower left -->
  <circle cx="20" cy="38" r="1.8" fill="#A5B4FC"/>
  <!-- Lower right -->
  <circle cx="40" cy="38" r="1.8" fill="#A5B4FC"/>
  <!-- Bottom center -->
  <circle cx="30" cy="50" r="2" fill="#6366F1"/>

  <!-- Lyra lines: top to sides -->
  <line x1="30" y1="8" x2="16" y2="20" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="8" x2="44" y2="20" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cross bar -->
  <line x1="16" y1="20" x2="44" y2="20" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Down to lower points -->
  <line x1="16" y1="20" x2="20" y2="38" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="20" x2="40" y2="38" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lower bar -->
  <line x1="20" y1="38" x2="40" y2="38" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Down to base -->
  <line x1="20" y1="38" x2="30" y2="50" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="38" x2="30" y2="50" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
</svg>
