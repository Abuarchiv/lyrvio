<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Combination mark: Icon (left) + Wordmark (right) -->

  <!-- Icon: Lyra constellation, scaled to fit left side (40x52, centered in 0-52 zone) -->
  <g transform="translate(4, 4) scale(0.83)">
    <!-- Stars -->
    <circle cx="30" cy="8"  r="2.5" fill="#F59E0B"/>
    <circle cx="16" cy="20" r="1.8" fill="#A5B4FC"/>
    <circle cx="44" cy="20" r="1.8" fill="#A5B4FC"/>
    <circle cx="20" cy="38" r="1.8" fill="#A5B4FC"/>
    <circle cx="40" cy="38" r="1.8" fill="#A5B4FC"/>
    <circle cx="30" cy="50" r="2"   fill="#6366F1"/>
    <!-- Lines -->
    <line x1="30" y1="8"  x2="16" y2="20" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="30" y1="8"  x2="44" y2="20" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="16" y1="20" x2="44" y2="20" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="16" y1="20" x2="20" y2="38" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="44" y1="20" x2="40" y2="38" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="20" y1="38" x2="40" y2="38" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="20" y1="38" x2="30" y2="50" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="40" y1="38" x2="30" y2="50" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Divider line -->
  <line x1="54" y1="10" x2="54" y2="50" stroke="#E2E8F0" stroke-width="1" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text
    x="62"
    y="40"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="700"
    letter-spacing="-1"
    fill="#0F0F23"
  >lyrvio</text>

  <!-- Star above i in wordmark -->
  <g transform="translate(155, 10)">
    <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z"
          fill="#F59E0B"/>
  </g>
</svg>
