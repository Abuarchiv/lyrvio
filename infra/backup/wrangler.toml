name = "lyrvio-backup"
main = "turso-backup-worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Cron-Trigger: täglich 03:00 UTC
[triggers]
crons = ["0 3 * * *"]

# R2-Bucket-Binding
[[r2_buckets]]
binding = "BACKUP_BUCKET"
bucket_name = "lyrvio-db-backups"
# preview_bucket_name = "lyrvio-db-backups-preview"

# Secrets (via `wrangler secret put`):
# TURSO_DATABASE_URL   — libsql://lyrvio-<account>.turso.io
# TURSO_AUTH_TOKEN     — JWT Token aus Turso Dashboard
# BACKUP_ENCRYPTION_KEY — optional, AES-256 (32 Byte Hex)

[env.production]
name = "lyrvio-backup"
vars = {}

[env.staging]
name = "lyrvio-backup-staging"
vars = {}
