name = "lyrvio-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
BETTER_AUTH_URL = "https://api.lyrvio.com"
ALLOWED_ORIGINS = "https://lyrvio.pages.dev,https://lyrvio.com,chrome-extension://*"

# Cloudflare D1 — SQLite, kostenlos 5 GB, kein extra Auth
[[d1_databases]]
binding = "DB"
database_name = "lyrvio-prod"
database_id = "335856e6-c2bb-41a1-ac65-d91aec13baf4"

# Cloudflare Workers AI — kostenlos 10K Neurons/Tag (kein API-Key nötig)
[ai]
binding = "AI"

# Analytics Engine — kostenlos 100K Events/Tag
# Aktivieren: https://dash.cloudflare.com/<account>/workers/analytics-engine (einmalig)
# [[analytics_engine_datasets]]
# binding = "METRICS"
# dataset = "lyrvio_metrics"

# Cron Trigger — täglich 07:00 UTC für Welcome-Sequenz + andere Batch-Jobs
[triggers]
crons = ["0 7 * * *"]

# Secrets werden via `wrangler secret put` gesetzt:
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# RESEND_FROM (z.B. "Abu von Lyrvio <abu@lyrvio.de>")
# BETTER_AUTH_SECRET
# SENTRY_DSN  (Sentry Free Tier — kein eigener Server nötig)
# TELEGRAM_BOT_TOKEN
# TELEGRAM_CHAT_ID

[[rules]]
type = "ESModule"
globs = ["**/*.ts"]

[dev]
port = 8787
local_protocol = "http"
